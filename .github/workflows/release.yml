name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frontend
        run: pnpm run typecheck

      - name: Test backend
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Lint backend
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build UniLoader
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --features custom-protocol
          tagName: ${{ github.ref_name }}
          releaseName: "UniLoader ${{ github.ref_name }}"
          releaseBody: |
            UniLoader's Vault Gallery update introduces an image-first library and discovery
            experience, clearer Steam profiles, streamlined mod installation, install result
            sounds, improved Nexus and Thunderstore handoffs, and reliability fixes across
            loader detection, archives, dependencies, and window behavior.

            v0.9.4 adds title-only Discovery search, a clean-launch Mods ON/OFF mode that
            preserves every individual library choice, and responsive profile controls that stay
            readable at the application's minimum window size. It also includes the Discovery
            pagination, fullscreen centering, and compact page-loading fixes from v0.9.3.
          releaseDraft: false
          prerelease: false

      - name: Generate and upload SHA-256 checksums
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installers = Get-ChildItem "src-tauri/target/release/bundle" -Recurse -File |
            Where-Object { $_.Extension -in @(".exe", ".msi") }
          if (-not $installers) { throw "No Windows installer was produced." }
          foreach ($installer in $installers) {
            $checksumPath = "$($installer.FullName).sha256"
            $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($installer.Name)" | Set-Content -LiteralPath $checksumPath -Encoding ascii
            gh release upload "${{ github.ref_name }}" $checksumPath --clobber
          }
