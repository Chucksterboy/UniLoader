name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frontend
        run: pnpm run typecheck

      - name: Test backend
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Lint backend
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build UniLoader
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --features custom-protocol
          tagName: ${{ github.ref_name }}
          releaseName: "UniLoader ${{ github.ref_name }}"
          releaseBody: |
            UniLoader v0.9.14 improves library clarity, install feedback, and compact-window behavior.

            - Installed mods now expand to show descriptions, requirement status, and distinct deployment targets.
            - Equivalent install-route aliases are deduplicated while genuinely separate server targets remain visible.
            - Dependency checks and recent session activity are shown above the Install Vault.
            - Nexus handoffs report active installation state and installed discovery entries reconcile correctly.
            - The Install Vault now preserves spacing, stacks compact controls, and scrolls instead of overlapping in small windows.
            - A dedicated high-contrast tray icon stays clear and recognizable at Windows notification-area sizes.
          releaseDraft: false
          prerelease: false

      - name: Generate and upload SHA-256 checksums
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installers = Get-ChildItem "src-tauri/target/release/bundle" -Recurse -File |
            Where-Object { $_.Extension -in @(".exe", ".msi") }
          if (-not $installers) { throw "No Windows installer was produced." }
          foreach ($installer in $installers) {
            $checksumPath = "$($installer.FullName).sha256"
            $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($installer.Name)" | Set-Content -LiteralPath $checksumPath -Encoding ascii
            gh release upload "${{ github.ref_name }}" $checksumPath --clobber
          }
