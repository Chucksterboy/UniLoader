name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frontend
        run: pnpm run typecheck

      - name: Test backend
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Lint backend
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build UniLoader
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --features custom-protocol
          tagName: ${{ github.ref_name }}
          releaseName: "UniLoader ${{ github.ref_name }}"
          releaseBody: |
            UniLoader v0.9.7 improves future-game and runtime compatibility across the shared
            provider pipeline. Nexus game identities now use verified provider metadata and aliases,
            encoded installation instructions are decoded correctly, and nested UE4SS layouts such
            as RuneScape: Dragonwilds are detected and routed safely.

            Installed BepInEx, BepInEx IL2CPP, UE4SS, and REFramework runtimes now satisfy
            game-qualified Nexus requirements without unnecessary reinstall prompts. Stale Nexus
            browser handoffs belonging to deleted profiles are cleaned up and the newest valid
            profile request is always used.

            Profile Import / Export is restored for Steam-only mode. Bundles preserve managed mods,
            enabled states, installation plans, and configuration files, then automatically locate
            and verify the matching installed Steam game before restoring the profile.
          releaseDraft: false
          prerelease: false

      - name: Generate and upload SHA-256 checksums
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installers = Get-ChildItem "src-tauri/target/release/bundle" -Recurse -File |
            Where-Object { $_.Extension -in @(".exe", ".msi") }
          if (-not $installers) { throw "No Windows installer was produced." }
          foreach ($installer in $installers) {
            $checksumPath = "$($installer.FullName).sha256"
            $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($installer.Name)" | Set-Content -LiteralPath $checksumPath -Encoding ascii
            gh release upload "${{ github.ref_name }}" $checksumPath --clobber
          }
